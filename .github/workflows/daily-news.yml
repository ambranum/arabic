name: Daily news

# Runs at 10:00 UTC = 5am EST / 6am EDT.
#
# Deliberately an hour EARLY in winter rather than an hour late: GitHub's scheduler
# has no timezone support and cron can't follow DST, and content that isn't ready
# before the drive is content that doesn't get used. To shift it, change the number
# below (it is UTC) — 10 = 5am EST, 11 = 6am EST.
#
# GitHub also delays scheduled jobs under load, sometimes by 10+ minutes. Treat the
# time as "before the morning drive", not as an alarm clock.
on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:        # lets you run it by hand from the Actions tab

permissions:
  contents: write           # to commit the day's text back
  pages: write              # to publish
  id-token: write

concurrency:
  group: daily-news
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # full history — rebase/push misbehave on a shallow clone

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Write today's news, annotate, voice
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY:  ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
        run: python3 pipeline/daily_news.py --sentences 9

      - name: Commit the day's text (advisory — never blocks the deploy)
        continue-on-error: true
        run: |
          git config user.name  "daily-news"
          git config user.email "actions@github.com"
          git add texts/ build/ app/ pipeline/resolutions.json
          git diff --staged --quiet || git commit -m "news: $(date -u +%F)"

          # The remote can move between checkout and push — a human commit, or an
          # earlier run. A bare `git push` then dies with "fetch first" and the whole
          # day's work (audio included) is thrown away. Rebase onto whatever landed,
          # then push. Retry once for the narrow race where it moves again mid-rebase.
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin main && git push && exit 0
            echo "push attempt $attempt failed; retrying"
            sleep 5
          done
          echo "could not push after 3 attempts"
          exit 1

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app
      - uses: actions/deploy-pages@v4
